name: Build & Sign Release APKs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Split APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Restore/Decode Keystore File
        run: |
          mkdir -p android/app
          if [ ! -f "android/app/msgs" ]; then
            if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
              echo "Decoding keystore from KEYSTORE_BASE64 secret..."
              echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/msgs
            else
              echo "Error: Keystore file android/app/msgs not found in repository, and KEYSTORE_BASE64 secret is not configured."
              exit 1
            fi
          else
            echo "Keystore file already exists in repository at android/app/msgs"
          fi
        shell: bash

      - name: Install dependencies
        run: flutter pub get

      - name: Build Split APKs
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_FILE: "msgs"
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: flutter build apk --release --split-per-abi

      - name: Upload Split APKs
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: |
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          if-no-files-found: error
